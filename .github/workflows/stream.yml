name: 24-7 YouTube Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Verify video file
        run: ls -lh

      - name: Start YouTube Stream
        run: |
          ffmpeg -re -stream_loop -1 -i "Color With Me!.mp4" \
          -c:v libx264 -preset veryfast \
          -b:v 3500k -maxrate 3500k -bufsize 7000k \
          -pix_fmt yuv420p \
          -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}
