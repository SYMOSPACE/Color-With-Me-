name: YouTube 6 Hour Stream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Show repository files
      run: |
        ls -lh

    - name: Install FFmpeg
      run: |
        sudo apt update
        sudo apt install -y ffmpeg

    - name: Start livestream
      env:
        STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      run: |
        ffmpeg -re -stream_loop -1 -i "./color_with_me2.mp4" \
        -vf "scale=1280:720,fps=30,setpts=1.15*PTS" \
        -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k -g 60 \
        -c:a aac -b:a 128k -ar 44100 \
        -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" \
        -c:v libx264 -preset veryfast -b:v 1500k -maxrate 1500k -bufsize 3000k -g 60 \
        -c:a aac -b:a 96k -ar 44100 \
        -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
